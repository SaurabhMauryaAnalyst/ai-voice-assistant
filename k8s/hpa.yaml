apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voice-backend-hpa
  namespace: voice-assistant
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voice-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 65
