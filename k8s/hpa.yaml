apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: voice-backend-hpa
  namespace: voice-assistant
spec:
  # Which Deployment to scale:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: voice-backend

  minReplicas: 2    # never go below 2 (HA — one per AZ)
  maxReplicas: 10   # never exceed 10 pods

  metrics:
  # Scale based on CPU usage:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        # When average CPU across all pods exceeds 65%:
        # → add more pods until average drops below 65%
        # When average stays below 65% for 5 min:
        # → remove pods until you hit minReplicas
        averageUtilization: 65

  # Optional: also scale on memory (uncomment to enable):
  # - type: Resource
  #   resource:
  #     name: memory
  #     target:
  #       type: Utilization
  #       averageUtilization: 75

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30   # react to high load within 30s
      policies:
      - type: Pods
        value: 2                        # add at most 2 pods at a time
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300  # wait 5 min of low load before scaling down
      # (prevents flapping — scaling down too eagerly causes cold-start delays)
      policies:
      - type: Pods
        value: 1                        # remove at most 1 pod at a time
        periodSeconds: 60