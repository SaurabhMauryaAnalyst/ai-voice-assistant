apiVersion: apps/v1
kind: Deployment
metadata:
  name: voice-backend
  namespace: voice-assistant
spec:
  replicas: 2
  selector:
    matchLabels:
      app: voice-backend
  template:
    metadata:
      labels:
        app: voice-backend
    spec:
      serviceAccountName: voice-backend-sa  # IRSA for AWS Transcribe + Polly
      containers:
      - name: backend
        image: 123456789.dkr.ecr.us-east-1.amazonaws.com/voice-backend:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: voice-secrets
              key: anthropic-api-key
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: voice-config
              key: redis-url
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "1Gi"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: voice-backend-svc
  namespace: voice-assistant
spec:
  selector:
    app: voice-backend
  ports:
  - port: 80
    targetPort: 8000
