# ── Backend Service ───────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: voice-backend-svc
  namespace: voice-assistant
spec:
  # selector matches pods by label — automatically routes to healthy pods
  selector:
    app: voice-backend
  ports:
  - name: http
    port: 80           # port other services/ingress use to talk to this service
    targetPort: 8000   # port the backend container actually listens on
  type: ClusterIP      # internal only — not accessible from internet directly

---
# ── Frontend Service ──────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: voice-frontend-svc
  namespace: voice-assistant
spec:
  selector:
    app: voice-frontend
  ports:
  - name: http
    port: 80
    targetPort: 80
  type: ClusterIP

---
# ── Redis Service ─────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: redis-svc
  namespace: voice-assistant
spec:
  selector:
    app: redis
  ports:
  - port: 6379
    targetPort: 6379
  type: ClusterIP