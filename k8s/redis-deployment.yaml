# NOTE: This is a LOCAL Redis pod for testing only.
# In production we use AWS ElastiCache (provisioned by Terraform).
# This pod is useful for local cluster testing without ElastiCache.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: voice-assistant
spec:
  replicas: 1     # single Redis — ElastiCache handles HA in production
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine    # public image — no ECR needed
        ports:
        - containerPort: 6379
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        command: ["redis-server", "--maxmemory", "200mb",
                  "--maxmemory-policy", "allkeys-lru"]