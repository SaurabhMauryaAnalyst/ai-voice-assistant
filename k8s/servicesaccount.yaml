# This ServiceAccount is annotated with the IAM role ARN created by Terraform.
# Pods using this SA automatically receive AWS credentials
# for Transcribe + Polly — no access keys needed.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: voice-backend-sa
  namespace: voice-assistant
  annotations:
    # Get this ARN from: terraform output backend_irsa_role_arn
    eks.amazonaws.com/role-arn: "arn:aws:iam::966725471159:role/voice-backend-irsa-role"