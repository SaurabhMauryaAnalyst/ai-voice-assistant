<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>AI Voice Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>

    body {
      margin:0;
      font-family:Arial, Helvetica, sans-serif;

      background: linear-gradient(
        135deg,
        #1e3c72,
        #2a5298,
        #4facfe,
        #00f2fe
      );

      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    #app-container{
      background:white;
      padding:40px;
      border-radius:20px;
      width:500px;
      text-align:center;
      box-shadow:0 15px 40px rgba(0,0,0,0.3);
    }

    button{
      padding:12px 25px;
      margin:10px;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

    .start{
      background:#00c853;
      color:white;
    }

    .stop{
      background:#ff1744;
      color:white;
    }

  </style>
</head>

<body>

<div id="app-container">
  <div id="root"></div>
</div>

<script type="module" src="/src/main.jsx"></script>

</body>
</html>
