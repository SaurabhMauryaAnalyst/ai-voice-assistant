server {
    listen 80;
    server_name _;          # match any hostname

    root /usr/share/nginx/html;
    index index.html;

    # ── Static file serving with caching ─────────────────
    # Serve JS/CSS/images with long cache (content-hashed filenames)
    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── SPA fallback — THE most important rule ────────────
    # For any URL that doesn't match a real file:
    # Try the exact file → try as directory → fall back to index.html
    # This lets React Router handle /settings, /history etc.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # ── Gzip compression ──────────────────────────────────
    # Compresses JS/CSS before sending — reduces bandwidth ~70%
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               image/svg+xml;
    gzip_min_length 1000;

    # ── Health check endpoint ─────────────────────────────
    # Kubernetes liveness probe hits this URL
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}